<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Music Player | Loudly</title>
    <style>
      /* Vendored Outfit (SIL OFL 1.1) — no CDN; offline-safe. */
      @font-face {
        font-family: 'Outfit';
        font-style: normal;
        font-weight: 300 600;
        font-display: swap;
        src: url('vendor/fonts/outfit-latin.woff2') format('woff2'),
             url('vendor/fonts/outfit-latinext.woff2') format('woff2');
      }

      :root {
        --primary: #ff3366;
        --secondary: #6600ff;
        --bg: #0f0c29;
        --glass: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        overflow: hidden;
      }

      .player-container {
        width: 380px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .artwork-container {
        width: 220px;
        height: 220px;
        background: linear-gradient(45deg, var(--primary), var(--secondary));
        border-radius: 20px;
        margin-bottom: 25px;
        box-shadow: 0 15px 35px rgba(255, 51, 102, 0.3);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      .artwork-container::before {
        content: "";
        position: absolute;
        width: 140%;
        height: 140%;
        background: rgba(255, 255, 255, 0.1);
        transform: rotate(45deg);
      }

      .music-icon {
        font-size: 60px;
        animation: pulse 2s infinite ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.1);
        }
      }

      .track-info h1 {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 8px;
        background: linear-gradient(to right, #fff, #ddd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .track-info p {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 20px;
      }

      .controls {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .progress-container {
        width: 100%;
        margin-bottom: 20px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* 44px-tall hit area; the visible 6px track is centered inside. */
      .progress-bar {
        width: 100%;
        height: 44px;
        display: flex;
        align-items: center;
        cursor: pointer;
        position: relative;
        background: transparent;
      }
      .progress-bar::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      .progress-bar:focus-visible {
        outline: 3px solid var(--primary);
        outline-offset: 4px;
        border-radius: 6px;
      }
      .btn-play:focus-visible {
        outline: 3px solid var(--primary);
        outline-offset: 3px;
      }

      .progress-fill {
        position: relative;
        height: 6px;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        border-radius: 3px;
        width: 0%;
        transition: width 0.1s linear;
      }

      .time-labels {
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #888;
        margin-top: 5px;
      }

      .btn-play {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #fff;
        border: none;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn-play:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(255, 255, 255, 0.3);
      }

      .btn-play:active {
        transform: scale(0.95);
      }

      .btn-play svg {
        fill: #1a1a1a;
        width: 24px;
        height: 24px;
        transition: transform 0.2s;
      }

      .playing .btn-play svg {
        transform: translateX(0);
      }

      .waveform {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 4px;
        height: 30px;
        margin-bottom: 15px;
        opacity: 0.5;
        transition: opacity 0.3s;
      }

      .playing .waveform {
        opacity: 1;
      }

      .bar {
        width: 4px;
        height: 5px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
      }

      .playing .bar {
        background: var(--primary);
        animation: bounce 1.2s infinite ease-in-out;
      }

      .playing .bar:nth-child(2) {
        animation-delay: 0.2s;
        height: 15px;
      }

      .playing .bar:nth-child(3) {
        animation-delay: 0.4s;
        height: 25px;
      }

      .playing .bar:nth-child(4) {
        animation-delay: 0.6s;
        height: 12px;
      }

      .playing .bar:nth-child(5) {
        animation-delay: 0.8s;
        height: 18px;
      }

      @keyframes bounce {
        0%,
        100% {
          height: 5px;
        }

        50% {
          height: 25px;
        }
      }

      /* Error panel — surfaces fail() output. */
      #error-wrap { display: none; width: 100%; margin-top: 18px; }
      #error-wrap:has(#error:not([hidden])) {
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: rgba(255, 51, 102, 0.12);
        border: 1px solid #ff6b8a;
        color: #ffd9e2;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 14px;
      }
      #error-wrap .error-row { display: flex; align-items: center; gap: 8px; }
      #error-wrap svg { width: 20px; height: 20px; flex-shrink: 0; }
      #error-retry {
        align-self: flex-start;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
      }
      #error-retry:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

      @media (prefers-reduced-motion: reduce) {
        .player-container { animation: none; }
        .music-icon { animation: none; }
        .playing .bar { animation: none; }
        .progress-fill { transition: none; }
        .btn-play { transition: none; }
      }
    </style>
  </head>

  <body>
    <div class="player-container" id="player">
      <div class="track-info">
        <h1 id="track-title">Vibe Track</h1>
        <p id="track-status" role="status" aria-live="polite">Wait for generation</p>
      </div>

      <div class="controls">
        <div class="progress-container">
          <div
            class="progress-bar"
            id="progress-bar"
            role="slider"
            tabindex="0"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-valuetext="0:00"
          >
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="time-labels">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
          </div>
        </div>

        <button class="btn-play" id="btn-play" type="button">
          <svg id="play-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z" id="play-path" />
          </svg>
        </button>
      </div>

      <div id="error-wrap">
        <div class="error-row">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <span id="error" role="alert" hidden data-i18n="music.errorTitle">Couldn’t play this track</span>
        </div>
        <button id="error-retry" type="button" data-i18n="music.retry">Try again</button>
      </div>
    </div>

    <audio id="audio-element"></audio>

    <script type="module">
      import { log } from '../../shared/log.js';
      import { fail } from '../../shared/result.js';
      import { t, hydrate } from '../../shared/i18n.js';

      hydrate();

      const params = new URLSearchParams(window.location.search);
      const audioUrl = params.get("url");
      const genre = params.get("genre") || "Ambient";

      const player = document.getElementById("player");
      const title = document.getElementById("track-title");
      const statusText = document.getElementById("track-status");
      const playBtn = document.getElementById("btn-play");
      const playIconPath = document.getElementById("play-path");
      const audio = document.getElementById("audio-element");
      const progressBar = document.getElementById("progress-bar");
      const progressFill = document.getElementById("progress-fill");
      const currentTimeEl = document.getElementById("current-time");
      const totalTimeEl = document.getElementById("total-time");

      // Icon-only play/pause button needs an accessible name; keep it in sync.
      function setPlayLabel(playing) {
        playBtn.setAttribute('aria-label', t(playing ? 'music.pause' : 'music.play'));
      }
      setPlayLabel(false);
      progressBar.setAttribute('aria-label', t('music.seek'));

      title.textContent = `Vibe: ${genre}`;
      statusText.textContent = audioUrl ? "Ready to play" : "Demo Track (No URL provided)";

      if (audioUrl) {
        audio.src = audioUrl;
      } else {
        // No track URL: honest empty state — do NOT stream a random external demo song.
        title.textContent = t('music.noTrackTitle');
        statusText.textContent = t('music.noTrack');
        if (playBtn) {
          playBtn.disabled = true;
          playBtn.setAttribute('aria-disabled', 'true');
        }
      }

      playBtn.addEventListener("click", () => {
        if (audio.paused) {
      audio
        .play()
        .then(() => {
          player.classList.add("playing");
          // Change icon to pause
          playIconPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
          setPlayLabel(true);
          statusText.textContent = "Now Playing";
        })
        .catch((e) => {
          if (e.name === 'NotAllowedError') {
            // Expected: browser blocked autoplay until a user gesture.
            log.warn('mood-music.playback autoplay blocked', e);
            statusText.textContent = "Tap play to start";
          } else {
            // Real failure surfaced to the user with retry (not a silent error).
            fail('mood-music.playback', e, t('music.errorTitle'));
            statusText.textContent = "Playback Error (CORS or Invalid URL)";
          }
        });
        } else {
          audio.pause();
          player.classList.remove("playing");
          // Change icon back to play
          playIconPath.setAttribute("d", "M8 5v14l11-7z");
          setPlayLabel(false);
          statusText.textContent = "Paused";
        }
      });

      function updateSliderAria() {
        const dur = audio.duration;
        const pct = dur ? Math.round((audio.currentTime / dur) * 100) : 0;
        progressBar.setAttribute("aria-valuenow", String(pct));
        progressBar.setAttribute("aria-valuetext", formatTime(audio.currentTime));
      }

      audio.addEventListener("timeupdate", () => {
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${percent}%`;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        updateSliderAria();
      });

      audio.addEventListener("loadedmetadata", () => {
        totalTimeEl.textContent = formatTime(audio.duration);
        updateSliderAria();
      });

      function seekToPercent(percent) {
        if (!audio.duration) return;
        audio.currentTime = Math.max(0, Math.min(1, percent)) * audio.duration;
        updateSliderAria();
      }

      progressBar.addEventListener("click", (e) => {
        const rect = progressBar.getBoundingClientRect();
        const offset = e.clientX - rect.left;
        seekToPercent(offset / rect.width);
      });

      // Keyboard slider: arrows ±5s, Home/Up = start, End = end.
      progressBar.addEventListener("keydown", (e) => {
        if (!audio.duration) return;
        const step = 5 / audio.duration;
        const cur = audio.currentTime / audio.duration;
        let next = null;
        if (e.key === "ArrowRight" || e.key === "ArrowUp") next = cur + step;
        else if (e.key === "ArrowLeft" || e.key === "ArrowDown") next = cur - step;
        else if (e.key === "Home") next = 0;
        else if (e.key === "End") next = 1;
        if (next === null) return;
        e.preventDefault();
        seekToPercent(next);
      });

      audio.addEventListener("ended", () => {
        player.classList.remove("playing");
        playIconPath.setAttribute("d", "M8 5v14l11-7z");
        setPlayLabel(false);
        statusText.textContent = "Ended";
      });

      // Retry re-loads the audio source and clears the error.
      document.getElementById("error-retry").addEventListener("click", () => {
        document.getElementById("error").hidden = true;
        audio.load();
        audio.play().then(() => {
          player.classList.add("playing");
          playIconPath.setAttribute("d", "M6 19h4V5H6v14zm8-14v14h4V5h-4z");
          setPlayLabel(true);
          statusText.textContent = "Now Playing";
        }).catch((e) => {
          fail('mood-music.retry', e, t('music.errorTitle'));
        });
      });

      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? "0" : ""}${s}`;
      }
    </script>
  </body>
</html>
