<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Roulette UI</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1e1e2f;
        color: #fff;
        font-family: sans-serif;
        overflow: hidden;
        touch-action: manipulation;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 20px 0;
        text-align: center;
        font-size: 20px;
        padding: 0 15px;
      }
      p.subtitle {
        margin: 0 0 20px 0;
        color: #aaa;
        font-size: 14px;
      }

      /* Empty / error / setup state panel */
      #state-panel {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0 24px;
        max-width: 420px;
      }
      #state-panel[data-visible="true"] {
        display: flex;
      }
      #state-title {
        font-size: 20px;
        font-weight: bold;
        margin: 0 0 8px 0;
      }
      #state-desc {
        color: #aaa;
        font-size: 15px;
        margin: 0;
      }

      /* The perfectly sized, compact wheel container */
      #wheel-container {
        position: relative;
        width: 240px;
        height: 240px;
        margin-bottom: 30px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      canvas {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 8px 15px rgba(0, 0, 0, 0.5));
      }

      /* The little red arrow at the top */
      #pointer {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 12px solid transparent;
        border-right: 12px solid transparent;
        border-top: 24px solid #ff4757;
        z-index: 10;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        pointer-events: none;
      }

      #spin-btn {
        background: #ff4757;
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);
        -webkit-tap-highlight-color: transparent;
      }
      @media (prefers-reduced-motion: reduce) {
        #spin-btn:active {
          transform: none;
        }
        canvas {
          filter: none;
        }
      }
      #spin-btn:active {
        transform: scale(0.95);
      }
      #spin-btn:disabled {
        background: #555;
        cursor: not-allowed;
        box-shadow: none;
      }
      #spin-btn:focus-visible,
      #close-modal:focus-visible,
      #error-retry:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* Loading state (decode/render) */
      #loading {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #aaa;
        margin-bottom: 20px;
      }
      #loading[hidden] { display: none; }
      .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #ff4757;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Error panel — surfaces fail() output. */
      #error-wrap { display: none; }
      #error-wrap:has(#error:not([hidden])) {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        text-align: center;
        max-width: 420px;
        padding: 16px 20px;
        margin-bottom: 20px;
        background: rgba(255, 71, 87, 0.12);
        border: 1px solid #ff4757;
        border-radius: 14px;
        color: #ffd9dd;
      }
      #error-wrap .error-row { display: flex; align-items: center; gap: 8px; }
      #error-wrap svg { width: 20px; height: 20px; flex-shrink: 0; }
      #error-retry {
        background: #ff4757;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
      }

      @media (prefers-reduced-motion: reduce) {
        .spinner { animation: none; }
      }

      /* Winner Pop-up Overlay */
      #winner-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
        backdrop-filter: blur(5px);
      }
      #winner-title {
        color: #2ed573;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      #winner-name {
        color: #fff;
        font-size: 36px;
        font-weight: bold;
        text-transform: uppercase;
        text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        margin-bottom: 30px;
      }
      #close-modal {
        background: #fff;
        color: #1e1e2f;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        min-width: 44px;
        min-height: 44px;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Loading...</h1>

    <div id="loading" role="status" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <span data-i18n="common.loading">Loading…</span>
    </div>

    <div id="state-panel" role="status">
      <p id="state-title"></p>
      <p id="state-desc"></p>
    </div>

    <!-- fail() target: unhiding #error reveals this panel + retry. -->
    <div id="error-wrap">
      <div class="error-row">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="error" role="alert" hidden data-i18n="roulette.errorTitle">Couldn’t load the restaurant list</span>
      </div>
      <button id="error-retry" type="button" data-i18n="common.retry">Retry</button>
    </div>

    <div id="wheel-container">
      <div id="pointer"></div>
      <!-- High-res 600x600 canvas ensures text is not blurry when shrunk by CSS -->
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <button id="spin-btn" data-i18n="roulette.spin">Spin roulette</button>

    <div id="winner-overlay" role="dialog" aria-modal="true" aria-labelledby="winner-title winner-name">
      <div id="winner-title"></div>
      <div id="winner-name">Restaurant Name</div>
      <button id="close-modal" data-i18n="roulette.spinAgain">Spin again</button>
    </div>

    <script type="module">
      import { log } from '../../shared/log.js';
      import { fail } from '../../shared/result.js';
      import { t, hydrate } from '../../shared/i18n.js';

      hydrate();
      document.getElementById('winner-title').textContent = `🎉 ${t('roulette.winner')} 🎉`;

      const params = new URLSearchParams(window.location.search);
      const cuisine = params.get("c") || "Food";
      const locationStr = params.get("l") || "Nearby";
      const compressedData = params.get("data");
      const errorParam = params.get("error");

      // Non-spinnable states: setup required, decode failure, or no data.
      // The wheel and spin button hide; a real state panel renders instead.
      function showState(titleKey, descKey) {
        document.getElementById('state-title').textContent = t(titleKey);
        document.getElementById('state-desc').textContent = t(descKey);
        document.getElementById('state-panel').setAttribute('data-visible', 'true');
        document.getElementById('wheel-container').style.display = 'none';
        document.getElementById('spin-btn').style.display = 'none';
      }

      let places = [];
      if (errorParam === 'missing_key') {
        document.getElementById('title').textContent = t('roulette.setupTitle');
        showState('roulette.setupTitle', 'roulette.setupDesc');
      } else if (compressedData) {
        try {
          const placeString = decodeURIComponent(escape(atob(compressedData)));
          places = placeString.split("|").filter((p) => p.trim().length > 0);
        } catch (e) {
          // Surface as a role=alert error with retry (in addition to the panel).
          fail('restaurant-roulette.decode', e, t('roulette.errorTitle'));
          showState('roulette.errorTitle', 'roulette.errorDesc');
        }
      }
      if (places.length === 0 && !document.getElementById('state-panel').hasAttribute('data-visible')) {
        showState('roulette.emptyTitle', 'roulette.emptyDesc');
      }

      if (errorParam !== 'missing_key') {
        document.getElementById("title").textContent = t('roulette.title', { cuisine, location: locationStr });
      }

      const canvas = document.getElementById("wheelCanvas");
      const wheelContainer = document.getElementById("wheel-container");
      const spinBtn = document.getElementById("spin-btn");
      const ctx = canvas.getContext("2d");

      // High-res math for perfect text alignment
      const cx = 300,
        cy = 300,
        radius = 280;
      const N = places.length || 1;
      const arc = (2 * Math.PI) / N;
      let angle = 0;
      let isSpinning = false;

      const colors = [
        "#ff4757",
        "#ffa502",
        "#2ed573",
        "#1e90ff",
        "#3742fa",
        "#ff6348",
        "#eccc68",
        "#7bed9f",
        "#70a1ff",
        "#5352ed",
      ];

      function draw() {
        ctx.clearRect(0, 0, 600, 600);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);

        for (let i = 0; i < N; i++) {
          // Draw slices
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, i * arc, (i + 1) * arc);
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();
          ctx.lineWidth = 4;
          ctx.strokeStyle = "#1e1e2f";
          ctx.stroke();

          // Draw Text
          ctx.save();
          const rot = N === 1 ? 0 : i * arc + arc / 2;
          ctx.rotate(rot);
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 28px sans-serif";

          let text = places[i] || "";
          if (text.length > 15) text = text.substring(0, 13) + "...";

          ctx.fillText(text, radius - 30, 0); // Spaced perfectly from the edge
          ctx.restore();
        }

        // Inner white circle
        ctx.beginPath();
        ctx.arc(0, 0, 45, 0, 2 * Math.PI);
        ctx.fillStyle = "#fff";
        ctx.fill();

        // Inner dark dot
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, 2 * Math.PI);
        ctx.fillStyle = "#1e1e2f";
        ctx.fill();

        ctx.restore();
      }

      if (places.length > 0) draw();

      const overlay = document.getElementById("winner-overlay");
      const closeBtn = document.getElementById("close-modal");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      function settleOnWinner() {
        isSpinning = false;

        let p = (-Math.PI / 2 - angle) % (2 * Math.PI);
        if (p < 0) p += 2 * Math.PI;
        const winnerIndex = Math.floor(p / arc);

        document.getElementById("winner-name").textContent = places[winnerIndex];
        overlay.style.display = "flex";
        closeBtn.focus();

        spinBtn.textContent = t('roulette.spin');
        spinBtn.disabled = false;
      }

      function triggerSpin() {
        if (isSpinning || places.length === 0) return;
        isSpinning = true;
        spinBtn.disabled = true;
        spinBtn.textContent = t('roulette.spinning');

        let velocity = (performance.now() % 1000 / 1000) * 0.2 + 0.35;

        if (reducedMotion.matches) {
          // Same physics integrated without animation frames: identical
          // winner distribution, no spinning motion.
          while (velocity >= 0.002) {
            angle += velocity;
            velocity *= 0.985;
          }
          draw();
          settleOnWinner();
          return;
        }

        function animate() {
          angle += velocity;
          velocity *= 0.985;
          draw();

          if (velocity < 0.002) {
            settleOnWinner();
          } else {
            requestAnimationFrame(animate);
          }
        }
        animate();
      }

      function closeOverlay() {
        overlay.style.display = "none";
        spinBtn.focus();
      }

      spinBtn.addEventListener("click", triggerSpin);
      wheelContainer.addEventListener("click", triggerSpin);
      closeBtn.addEventListener("click", closeOverlay);
      document.addEventListener("keydown", (e) => {
        if (overlay.style.display !== "flex") return;
        if (e.key === "Escape") {
          closeOverlay();
        } else if (e.key === "Tab") {
          // Trap focus inside the modal: only #close-modal is focusable.
          e.preventDefault();
          closeBtn.focus();
        }
      });

      // Retry from the fail() error panel: hide error and re-run decode/draw.
      document.getElementById("error-retry").addEventListener("click", () => {
        document.getElementById("error").hidden = true;
        location.reload();
      });
    </script>
  </body>
</html>
