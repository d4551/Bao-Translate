<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>3D 88-Key Virtual Piano</title>
    <style>
      body {
        margin: 0;
        background-color: #1e1e2f;
        display: flex;
        align-items: center;
        height: 100vh;
        overflow-y: hidden;
      }

      #piano-scroll-container {
        width: 100%;
        overflow-x: auto;
        white-space: nowrap;
        -ms-overflow-style: none;
        scrollbar-width: none;
        padding: 20px;
        touch-action: pan-x;
      }
      #piano-scroll-container::-webkit-scrollbar {
        display: none;
      }

      #piano {
        display: inline-flex;
        flex-direction: column;
        background: #222;
        padding: 10px 10px 0 10px;
        border-radius: 12px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.8),
          inset 0 2px 5px rgba(255, 255, 255, 0.1);
      }

      #key-container {
        display: flex;
        position: relative;
      }

      /* THE FIX: Explicitly lock the wrapper to 60px and remove the z-index bias! */
      .key-group {
        position: relative;
        display: block;
        width: 60px;
        flex-shrink: 0;
      }

      #scroll-lip {
        height: 60px;
        background: linear-gradient(to bottom, #333, #1a1a1a);
        border-top: 2px solid #111;
        border-radius: 0 0 10px 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 -10px;
        color: #666;
        font-family: sans-serif;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 3px;
        user-select: none;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      /* White Keys */
      .key.white {
        touch-action: pan-x;
        width: 100%;
        height: 250px; /* Takes up exactly the 60px of its fair wrapper */
        background: linear-gradient(to bottom, #ffffff 80%, #f0f0f0 100%);
        box-sizing: border-box;
        border-right: 1px solid #ccc;
        border-bottom: 2px solid #bbb;
        border-radius: 0 0 6px 6px;
        box-shadow: 0 4px 5px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 15px;
        font-family: sans-serif;
        font-size: 14px;
        font-weight: bold;
        color: #aaa;
        user-select: none;
        position: relative;
        z-index: 1; /* All white keys are equal! */
      }
      .key-group:first-child .key.white {
        border-left: 1px solid #ccc;
      }

      .key.white:active,
      .key.white.active {
        background: #e0e0e0;
        box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
        color: #333;
      }

      /* Black Keys */
      .key.black {
        touch-action: pan-x;
        width: 30px;
        height: 140px;
        background: linear-gradient(to bottom, #444, #000);
        position: absolute;
        right: -15px; /* Sits perfectly in the middle of the borders */
        top: 0;
        z-index: 10; /* All black keys sit safely on top */
        box-sizing: border-box;
        border-radius: 0 0 5px 5px;
        border: 1px solid #111;
        border-bottom: 3px solid #000;
        box-shadow: 2px 4px 6px rgba(0, 0, 0, 0.5);
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .key.black:active,
      .key.black.active {
        background: #111;
        box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.9);
      }

      .key:focus-visible {
        outline: 3px solid #45b7d1;
        outline-offset: -3px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      #tap-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-size: 1.5rem;
        font-family: sans-serif;
        border: none;
        width: 100%;
        z-index: 1000;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1 class="visually-hidden" data-i18n="piano.title">88-key virtual piano</h1>
    <div id="piano-scroll-container">
      <div id="piano">
        <div id="key-container" role="group" data-i18n-aria="piano.keys" aria-label="Piano keys"></div>
        <div id="scroll-lip" data-i18n="piano.scrollHint" aria-hidden="true">⟷ SLIDE HERE TO SCROLL ⟷</div>
      </div>
    </div>

    <script type="module">
      import { log } from '../../_shared/log.js';
      import { t, hydrate } from '../../_shared/i18n.js';

      const keyContainer = document.getElementById("key-container");
      let noteNumber = 1;
      const noteNamesArray = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

      hydrate();

      // Keys are role=button with a roving tabindex: one tab stop for the
      // whole instrument, ArrowLeft/ArrowRight move between notes,
      // Enter/Space play. Accessible name is the note name (C4, C#4, ...).
      function makeKey(className, note, label) {
        const key = document.createElement("div");
        key.className = className;
        key.setAttribute("data-note", note);
        key.setAttribute("role", "button");
        key.setAttribute("aria-label", label);
        key.setAttribute("tabindex", note === 40 ? "0" : "-1"); // middle C is the tab stop
        return key;
      }

      // 1. GENERATE THE KEYS (No more biased Z-Index loop!)
      while (noteNumber <= 88) {
        const group = document.createElement("div");
        group.className = "key-group";

        const cOffset = (noteNumber + 8) % 12;
        const noteName = noteNamesArray[cOffset];
        const octave = Math.floor((noteNumber + 8) / 12);

        const whiteKey = makeKey("key white", noteNumber, noteName + octave);
        whiteKey.innerText = noteName + octave;
        group.appendChild(whiteKey);

        if (cOffset !== 4 && cOffset !== 11 && noteNumber !== 88) {
          noteNumber++;
          const blackName = noteNamesArray[(noteNumber + 8) % 12];
          const blackOctave = Math.floor((noteNumber + 8) / 12);
          group.appendChild(makeKey("key black", noteNumber, blackName + blackOctave));
        }

        keyContainer.appendChild(group);
        noteNumber++;
      }

      // 2. THE AUDIO ENGINE
      const audioNotes = {};
      for (let i = 1; i <= 88; i++) {
        const audioUrl = `assets/${i}.mp3`;
        audioNotes[i] = new Audio(audioUrl);
      }

      const keys = Array.from(document.querySelectorAll(".key"));

      function playKey(keyEl) {
        const note = keyEl.getAttribute("data-note");
        const audio = audioNotes[note];
        if (!audio) return;

        audio.currentTime = 0;
        audio.play().catch((e) => {
          if (e.name === 'NotAllowedError') {
            showTapToPlayOverlay();
          } else {
            log.error('virtual-piano.audio', e);
          }
        });

        keyEl.classList.add("active");
        setTimeout(() => {
          audio.pause();
          audio.currentTime = 0;
        }, 2000);
      }

      keys.forEach((key, index) => {
        key.addEventListener("pointerdown", function (event) {
          event.stopPropagation();
          playKey(this);
        });

        key.addEventListener("pointerup", function () {
          this.classList.remove("active");
        });
        key.addEventListener("pointerleave", function () {
          this.classList.remove("active");
        });
        key.addEventListener("pointercancel", function () {
          this.classList.remove("active");
        });

        key.addEventListener("keydown", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            playKey(this);
            return;
          }
          const dir = event.key === "ArrowRight" ? 1 : event.key === "ArrowLeft" ? -1 : 0;
          if (dir === 0) return;
          event.preventDefault();
          const next = keys[index + dir];
          if (!next) return;
          this.setAttribute("tabindex", "-1");
          next.setAttribute("tabindex", "0");
          next.focus();
          next.scrollIntoView({ behavior: "auto", inline: "nearest", block: "nearest" });
        });

        key.addEventListener("keyup", function (event) {
          if (event.key === "Enter" || event.key === " ") {
            this.classList.remove("active");
          }
        });
      });

      function showTapToPlayOverlay() {
        if (document.getElementById('tap-overlay')) return;
        const overlay = document.createElement('button');
        overlay.id = 'tap-overlay';
        overlay.textContent = t('piano.tapToEnable');
        overlay.addEventListener('pointerdown', () => overlay.remove(), { once: true });
        overlay.addEventListener('click', () => overlay.remove(), { once: true });
        document.body.appendChild(overlay);
        overlay.focus();
      }

      // 3. AUTO-SCROLL TO MIDDLE C
      setTimeout(() => {
        const middleC = document.querySelector('.key.white[data-note="40"]');
        if (middleC) {
          middleC.scrollIntoView({ behavior: "auto", inline: "center", block: "nearest" });
        }
      }, 50);
    </script>
  </body>
</html>
