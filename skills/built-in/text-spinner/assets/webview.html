<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Full-Screen 3D Head Tracker</title>
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    #container { position: relative; width: 100vw; height: 100vh; perspective: 1000px; }
    video, canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    #spinning-label {
      position: absolute; pointer-events: none;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: white; padding: 12px 24px;
      border-radius: 50px; font-weight: 800;
      text-transform: uppercase; white-space: nowrap;
      z-index: 10; display: none;
      box-shadow: 0 10px 30px rgba(0, 150, 255, 0.4);
      transform-style: preserve-3d;
    }
    .status {
      position: fixed; top: 20px; left: 20px;
      color: #7fe8ff; font-size: 14px; z-index: 100;
      background: rgba(0, 0, 0, 0.75); padding: 8px 12px; border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(127, 232, 255, 0.3);
      border-top-color: #7fe8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* Error panel — surfaces fail() output (init failure). */
    #error-wrap { display: none; }
    #error-wrap:has(#error:not([hidden])) {
      position: fixed; inset: auto 0 0 0; bottom: 24px;
      margin: 0 auto; max-width: 92vw; width: max-content;
      z-index: 200;
      display: flex; align-items: center; gap: 10px;
      background: rgba(40, 0, 0, 0.92);
      border: 1px solid #ff6b6b; color: #ffd9d9;
      border-radius: 12px; padding: 12px 16px; font-size: 14px;
    }
    #error-wrap svg { width: 20px; height: 20px; flex-shrink: 0; }
    #error-retry {
      background: #ff6b6b; color: #1a1a2e; border: none;
      border-radius: 8px; padding: 10px 16px; font-weight: bold;
      cursor: pointer; min-width: 44px; min-height: 44px;
    }
    #error-retry:focus-visible { outline: 3px solid #fff; outline-offset: 2px; }

    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
    }
  </style>
</head>
<body>

  <h1 class="sr-only" data-i18n="spinner.title">Face label tracker</h1>

  <div class="status" id="status" role="status" aria-live="polite">
    <span class="spinner" id="status-spinner" aria-hidden="true"></span>
    <span id="status-text" data-i18n="spinner.loading">Starting camera and face tracker…</span>
  </div>

  <div id="container">
    <!-- Live camera AR preview; decorative for AT (no actionable content). -->
    <video id="webcam" autoplay playsinline aria-hidden="true"></video>
    <canvas id="output_canvas" aria-hidden="true"></canvas>
    <div id="spinning-label" aria-hidden="true">Label</div>
  </div>

  <!-- fail() target: unhiding #error reveals this panel + retry. -->
  <div id="error-wrap">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <span id="error" role="alert" hidden data-i18n="spinner.errorTitle">Camera or tracker failed to start</span>
    <button id="error-retry" type="button" data-i18n="common.retry">Retry</button>
  </div>

  <script type="module">
    import { log } from '../../shared/log.js';
    import { fail } from '../../shared/result.js';
    import { t, hydrate } from '../../shared/i18n.js';
    import {
      FaceLandmarker,
      FilesetResolver
    } from "./vendor/vision_bundle.mjs";

    hydrate();

    let faceLandmarker;
    let rotationZ = 0;
    // Respect reduced-motion: skip the continuous label spin animation.
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("output_canvas");
    const labelDiv = document.getElementById("spinning-label");
    const statusDiv = document.getElementById("status");

    const urlParams = new URLSearchParams(window.location.search);
    labelDiv.innerText = urlParams.get('label') || "3D TRACKER";

    async function init() {
      document.getElementById("error").hidden = true;
      statusDiv.style.display = "flex";
      try {
        // Pointing to the WASM folder explicitly
        const filesetResolver = await FilesetResolver.forVisionTasks(
          "./vendor/wasm"
        );

        faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: {
            modelAssetPath: `./vendor/face_landmarker.task`,
            delegate: "CPU"
          },
          runningMode: "VIDEO",
          numFaces: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }
        });
        video.srcObject = stream;

        video.onloadeddata = () => {
          statusDiv.style.display = "none";
          canvasElement.width = window.innerWidth;
          canvasElement.height = window.innerHeight;
          predict();
        };

      } catch (err) {
        statusDiv.style.display = "none";
        fail('text-spinner.init', err, t('spinner.errorTitle'));
      }
    }

    document.getElementById("error-retry").addEventListener("click", init);

    function predict() {
      if (video.currentTime !== -1 && faceLandmarker) {
        const results = faceLandmarker.detectForVideo(video, performance.now());

        if (results.faceLandmarks && results.faceLandmarks.length > 0) {
          labelDiv.style.display = "block";
          const landmarks = results.faceLandmarks[0];

          const topHead = landmarks[10];
          const noseTip = landmarks[4];
          const leftFace = landmarks[234];
          const rightFace = landmarks[454];

          // 3D calculation
          const screenX = (1 - topHead.x) * window.innerWidth;
          const screenY = topHead.y * window.innerHeight;

          const distToLeft = Math.abs(noseTip.x - leftFace.x);
          const distToRight = Math.abs(noseTip.x - rightFace.x);
          const yawFactor = (distToLeft / (distToLeft + distToRight) - 0.5) * 2;
          const rotationY = yawFactor * -60;

          const faceWidth = Math.sqrt(Math.pow(rightFace.x - leftFace.x, 2) + Math.pow(rightFace.y - leftFace.y, 2));
          const fontSize = Math.max(16, Math.min(80, faceWidth * 100));

          // Continuous Z spin is motion; disable it under reduced-motion.
          if (!reducedMotion) rotationZ = (rotationZ + 4) % 360;

          labelDiv.style.fontSize = fontSize + "px";
          labelDiv.style.left = screenX + "px";
          labelDiv.style.top = (screenY - (fontSize * 1.5)) + "px";
          labelDiv.style.transform = `translate(-50%, -50%) rotateY(${rotationY}deg) rotateZ(${rotationZ}deg)`;
        } else {
          labelDiv.style.display = "none";
        }
      }
      requestAnimationFrame(predict);
    }

    init();
  </script>
</body>
</html>
